name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ai-calendar-assistant

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          HAS_FEAT=$(git log v${LATEST}..HEAD --oneline 2>/dev/null | grep -cE "^[a-f0-9]+ feat:") || true
          HAS_FIX=$(git log v${LATEST}..HEAD --oneline 2>/dev/null | grep -cE "^[a-f0-9]+ fix:") || true

          if [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + HAS_FEAT))
            PATCH=0
          elif [ "$HAS_FIX" -gt 0 ]; then
            PATCH=$((PATCH + HAS_FIX))
          else
            echo "No feat/fix since v${LATEST}, skip bump."
            echo "SKIP_BUMP=1" >> $GITHUB_ENV
            echo "VER=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV
            exit 0
          fi

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $LATEST → $NEW"
          echo "VER=$NEW" >> $GITHUB_ENV
          echo "SKIP_BUMP=0" >> $GITHUB_ENV

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a "$NEW" -m "Release $NEW"
          git push origin "$NEW"

      - name: Generate version files
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD")
          git describe --tags --always > VERSION
          PREV=$(git describe --tags --abbrev=0 --match='v*' --exclude="$CURRENT" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          git log --format="- %s" $PREV..$CURRENT > CHANGES

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
