services:
  app:
    network_mode: host
    build: .
    image: ai-calendar-assistant:dev
    user: "1000:1000"
    volumes:
      - ./data:/app/data
    command: >
      sh -c '
        git describe --tags --always > VERSION 2>/dev/null || echo "dev" > VERSION;
        git log --format="- %s" -20 > CHANGES 2>/dev/null || echo "" > CHANGES;
        uvicorn app.main:app --host 127.0.0.1 --port 9527
      '
