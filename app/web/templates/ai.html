{% extends "base.html" %}
{% block content %}
<script>
function selectModel(sel) {
  const input = document.querySelector('input[name="model"]');
  if (input) input.value = sel.value;
}
</script>

<section class="card">
  <h1>AI Settings</h1>
  <p class="muted">配置 AI Provider、Base URL、API Key，拉取模型列表选择，测试连接通过后保存。</p>
  {% if message %}<p class="alert success">{{ message }}</p>{% endif %}
  {% if error %}<p class="alert error">{{ error }}</p>{% endif %}

  <form method="post" action="/console/ai" class="stack">
    <label>
      Provider
      <select name="provider_name">
        {% for provider in providers %}
        <option value="{{ provider.name }}" {% if provider.name == provider_name %}selected{% endif %}>
          {{ provider.name }}
        </option>
        {% endfor %}
      </select>
    </label>
    <label>
      Provider Type
      <select name="provider_type">
        <option value="openai_compatible" {% if provider_type == 'openai_compatible' %}selected{% endif %}>openai_compatible</option>
        <option value="anthropic" {% if provider_type == 'anthropic' %}selected{% endif %}>anthropic</option>
      </select>
    </label>
    <label>
      Base URL
      <input name="base_url" value="{{ base_url }}" required>
    </label>
    <label>
      API Key
      <input name="api_key" type="password" value="" placeholder="{{ api_key_masked or '留空表示保持现有值' }}" autocomplete="off">
    </label>

    <div class="row" style="align-items: flex-end;">
      <label style="flex: 1;">
        Model
        {% if available_models %}
        <select name="model" onchange="selectModel(this)">
          {% for m in available_models %}
          <option value="{{ m }}" {% if model == m %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
        {% else %}
        <input name="model" value="{{ model }}" placeholder="先拉取模型列表后选择">
        {% endif %}
      </label>
      <button type="submit" formaction="/console/ai/models">拉取模型列表</button>
    </div>

    <div class="row">
      <button type="submit">保存 AI 设置</button>
      <button type="submit" formaction="/console/ai/test" style="background:#68758a;">测试连接</button>
    </div>
  </form>
</section>
{% endblock %}
