{% extends "base.html" %}
{% block content %}
<script>
const providerUrls = {
  {% for provider in providers %}
  "{{ provider.name }}": "{{ provider.base_url }}",
  {% endfor %}
};
function fillUrl(sel, inputName) {
  const url = providerUrls[sel.value];
  if (url) {
    const input = document.querySelector('input[name="' + inputName + '"]');
    if (input) input.value = url;
  }
}
function selectModel(sel) {
  const input = document.querySelector('input[name="model"]');
  if (input) input.value = sel.value;
}
function toggleVision() {
  const cb = document.querySelector('input[name="vision_use_main"]');
  const el = document.getElementById('vision-card');
  if (el) el.style.display = cb && cb.checked ? 'none' : 'block';
}
window.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('.cs-wrap').forEach(function(w){
    var t = w.querySelector('.cs-trigger'), d = w.querySelector('.cs-drop');
    t.addEventListener('click', function(e){ e.stopPropagation(); d.classList.toggle('open'); });
    w.querySelectorAll('.cs-opt').forEach(function(o){
      o.addEventListener('click', function(){
        var h = w.querySelector('input[type="hidden"]');
        if (h) { h.value = o.dataset.value; h.dispatchEvent(new Event('change')); }
        t.textContent = o.textContent;
        d.classList.remove('open');
      });
    });
  });
  document.addEventListener('click', function(){
    document.querySelectorAll('.cs-drop').forEach(function(d){ d.classList.remove('open'); });
  });
  var cb = document.querySelector('input[name="vision_use_main"]');
  if (cb) { toggleVision(); cb.addEventListener('change', toggleVision); }
});
</script>

<h2 class="section-title">AI 设置</h2>

{% if message %}<p class="alert success">{{ message }}</p>{% endif %}
{% if error %}<p class="alert error">{{ error }}</p>{% endif %}

<div class="card">
  <h2>主模型</h2>
  <p class="muted" style="margin-bottom:12px;">用于日程提取的 AI 模型。</p>
  <form method="post" action="/console/ai" class="stack">
    <div class="row" style="gap:16px;">
      <label style="flex:1;">
        <span>供应商</span>
        <div class="cs-wrap">
          <div class="cs-trigger">{{ provider_name }}</div>
          <div class="cs-drop">
            {% for provider in providers %}
            <div class="cs-opt {% if provider.name == provider_name %}sel{% endif %}" data-value="{{ provider.name }}">{{ provider.name }}</div>
            {% endfor %}
          </div>
          <input type="hidden" name="provider_name" value="{{ provider_name }}">
        </div>
      </label>
      <label style="max-width:180px;">
        <span>类型</span>
        <select name="provider_type">
          <option value="openai_compatible" {% if provider_type == 'openai_compatible' %}selected{% endif %}>OpenAI Compatible</option>
          <option value="anthropic" {% if provider_type == 'anthropic' %}selected{% endif %}>Anthropic</option>
        </select>
      </label>
    </div>
    <label>
      <span>Base URL</span>
      <input name="base_url" value="{{ base_url }}" required>
    </label>
    <label>
      <span>API Key</span>
      <input name="api_key" type="password" value="" placeholder="{{ api_key_masked or '留空表示保持现有值' }}" autocomplete="off">
    </label>
    <div class="row" style="align-items:flex-end;">
      <label style="flex:1;">
        <span>模型</span>
        {% if available_models %}
        <select name="model" onchange="selectModel(this)">
          {% for m in available_models %}
          <option value="{{ m }}" {% if model == m %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
        {% else %}
        <input name="model" value="{{ model }}" placeholder="先拉取模型列表后选择">
        {% endif %}
      </label>
      <button type="submit" formaction="/console/ai/models" class="secondary">拉取模型列表</button>
    </div>
    <label class="toggle-row" style="margin-top:12px;">
      <div>
        <div style="font-size:13px;font-weight:510;margin-bottom:2px;">用于图片识别</div>
        <div class="muted" style="font-size:12px;">收到图片时使用当前模型提取文字内容</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" name="vision_use_main" value="1" {% if vision_use_main and vision_use_main != 'false' %}checked{% endif %}>
        <span class="toggle-slider"></span>
      </label>
    </label>
    <div class="row" style="margin-top:4px;">
      <button type="submit" formaction="/console/ai/test" class="secondary">测试连接</button>
      <button type="submit">保存</button>
    </div>
  </form>
</div>

<div class="card" id="vision-card" style="display:none;">
  <h2>识图模型</h2>
  <p class="muted" style="margin-bottom:12px;">当收到图片时，调用该识图模型识别文字。</p>
  <form method="post" action="/console/ai" class="stack">
    <input type="hidden" name="vision_use_main" value="0">
    <div class="row" style="gap:16px;">
      <label style="flex:1;">
        <span>供应商</span>
        <select name="vision_provider_name" onchange="fillUrl(this,'vision_base_url')">
          {% for provider in providers %}
          <option value="{{ provider.name }}" {% if provider.name == vision_provider_name %}selected{% endif %}>{{ provider.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label style="max-width:180px;">
        <span>类型</span>
        <select name="vision_provider_type">
          <option value="openai_compatible" {% if vision_provider_type == 'openai_compatible' %}selected{% endif %}>OpenAI Compatible</option>
          <option value="anthropic" {% if vision_provider_type == 'anthropic' %}selected{% endif %}>Anthropic</option>
        </select>
      </label>
    </div>
    <label>
      <span>Base URL</span>
      <input name="vision_base_url" value="{{ vision_base_url }}">
    </label>
    <label>
      <span>API Key</span>
      <input name="vision_api_key" type="password" value="" placeholder="{{ vision_api_key_masked or '留空表示保持现有值' }}" autocomplete="off">
    </label>
    <div class="row" style="align-items:flex-end;">
      <label style="flex:1;">
        <span>模型</span>
        {% if vision_models %}
        <select name="vision_model">
          {% for m in vision_models %}
          <option value="{{ m }}" {% if vision_model == m %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
        {% else %}
        <input name="vision_model" value="{{ vision_model }}" placeholder="先拉取模型列表后选择">
        {% endif %}
      </label>
      <button type="submit" formaction="/console/ai/models" class="secondary">拉取模型列表</button>
    </div>
    <div class="row" style="margin-top:4px;">
      <button type="submit" formaction="/console/ai/test" class="secondary">测试连接</button>
      <button type="submit">保存</button>
    </div>
  </form>
</div>
{% endblock %}
