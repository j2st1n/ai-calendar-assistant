{% extends "base.html" %}
{% block content %}
<script>
const providerUrls = {
  {% for provider in providers %}
  "{{ provider.name }}": "{{ provider.base_url }}",
  {% endfor %}
};
function onProviderChange(sel) {
  const url = providerUrls[sel.value];
  if (url) {
    const input = document.querySelector('input[name="base_url"]');
    if (input) input.value = url;
  }
}
function selectModel(sel) {
  const input = document.querySelector('input[name="model"]');
  if (input) input.value = sel.value;
}
</script>

<h2 class="section-title">AI 设置</h2>
<p class="section-sub">配置供应商、Base URL、API Key，拉取模型列表选择，测试连接通过后保存。</p>

{% if message %}<p class="alert success">{{ message }}</p>{% endif %}
{% if error %}<p class="alert error">{{ error }}</p>{% endif %}

<div class="card">
  <form method="post" action="/console/ai" class="stack">
    <div class="row" style="gap:16px;">
      <label style="flex:1;">
        <span>供应商</span>
        <select name="provider_name" onchange="onProviderChange(this)">
          {% for provider in providers %}
          <option value="{{ provider.name }}" {% if provider.name == provider_name %}selected{% endif %}>
            {{ provider.name }}
          </option>
          {% endfor %}
        </select>
      </label>
      <label style="max-width:180px;">
        <span>类型</span>
        <select name="provider_type">
          <option value="openai_compatible" {% if provider_type == 'openai_compatible' %}selected{% endif %}>OpenAI Compatible</option>
          <option value="anthropic" {% if provider_type == 'anthropic' %}selected{% endif %}>Anthropic</option>
        </select>
      </label>
    </div>
    <label>
      <span>Base URL</span>
      <input name="base_url" value="{{ base_url }}" required>
    </label>
    <label>
      <span>API Key</span>
      <input name="api_key" type="password" value="" placeholder="{{ api_key_masked or '留空表示保持现有值' }}" autocomplete="off">
    </label>
    <div class="row" style="align-items:flex-end;">
      <label style="flex:1;">
        <span>模型</span>
        {% if available_models %}
        <select name="model" onchange="selectModel(this)">
          {% for m in available_models %}
          <option value="{{ m }}" {% if model == m %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>
        {% else %}
        <input name="model" value="{{ model }}" placeholder="先拉取模型列表后选择">
        {% endif %}
      </label>
      <button type="submit" formaction="/console/ai/models" class="secondary">拉取模型列表</button>
    </div>
    <div class="row" style="margin-top:4px;">
      <button type="submit" formaction="/console/ai/test" class="secondary">测试连接</button>
      <button type="submit">保存</button>
    </div>
  </form>
</div>
{% endblock %}
