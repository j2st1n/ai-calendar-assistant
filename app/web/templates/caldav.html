{% extends "base.html" %}
{% block content %}
<script>
function selectCalendar(sel) {
  const opt = document.querySelector('.cs-drop .sel') || document.querySelector('.cs-drop .cs-opt');
  const urlInput = document.querySelector('input[name="caldav_calendar_url"]');
  if (urlInput && opt) urlInput.value = opt.dataset.url;
}
window.addEventListener('DOMContentLoaded', function(){ selectCalendar(); });
</script>

<h2 class="section-title">日历设置</h2>
<p class="section-sub">配置 CalDAV 服务器，用于日程写入。支持 Apple iCloud、Nextcloud、Radicale 等标准 CalDAV 服务。</p>

{% if message %}<p class="alert success">{{ message }}</p>{% endif %}
{% if error %}<p class="alert error">{{ error }}</p>{% endif %}

<div class="card">
  <form method="post" action="/console/caldav" class="stack">
    <label>
      <span>日历服务器地址</span>
      <input name="caldav_url" value="{{ caldav_url }}" placeholder="https://caldav.icloud.com" required>
    </label>
    <label>
      <span>用户名</span>
      <input name="caldav_username" value="{{ caldav_username }}" placeholder="your-email@example.com" required>
    </label>
    <label>
      <span>密码 / 应用密码</span>
      <input name="caldav_password" type="password" value="" placeholder="{{ caldav_password_masked or '留空表示保持现有值' }}" autocomplete="off">
    </label>

    <div class="row" style="align-items:flex-end;">
      <label style="flex:1;">
        <span>日历</span>
        {% if calendars %}
        <div class="cs-wrap" data-onchange="selectCalendar">
          <div class="cs-trigger">{{ caldav_calendar_name or '选择日历' }}</div>
          <div class="cs-drop">
            {% for cal in calendars %}
            <div class="cs-opt {% if caldav_calendar_name == cal.name %}sel{% endif %}" data-value="{{ cal.name }}" data-url="{{ cal.url }}">{{ cal.name }}</div>
            {% endfor %}
          </div>
          <input type="hidden" name="caldav_calendar_name" value="{{ caldav_calendar_name }}">
        </div>
        {% else %}
        <input name="caldav_calendar_name" value="{{ caldav_calendar_name }}" placeholder="先拉取日历列表后选择">
        {% endif %}
      </label>
      <button type="submit" formaction="/console/caldav/calendars" class="secondary">拉取日历列表</button>
    </div>

    <label>
      <span>日历地址</span>
      <input name="caldav_calendar_url" value="{{ caldav_calendar_url }}" placeholder="选择日历后自动填充">
    </label>

    <div class="row" style="gap:16px;">
      <label style="flex:1;">
        <span>默认时区</span>
        <input name="caldav_timezone" value="{{ caldav_timezone }}" placeholder="Asia/Shanghai">
      </label>
      <label style="max-width:160px;">
        <span>提醒（分钟）</span>
        <input name="caldav_reminder_minutes" type="number" value="{{ caldav_reminder_minutes }}" min="0">
      </label>
      <label style="max-width:160px;">
        <span>时长（分钟）</span>
        <input name="caldav_default_duration" type="number" value="{{ caldav_default_duration }}" min="5">
      </label>
    </div>

    <div class="row" style="margin-top:4px;">
      <button type="submit">保存 CalDAV 设置</button>
      <button type="submit" formaction="/console/caldav/test" class="secondary">测试连接</button>
    </div>
  </form>
</div>
{% endblock %}
