{% extends "base.html" %}
{% block content %}
<section class="card">
  <h1>Status</h1>
  <p class="muted">当前阶段已完成登录、基础设置和事件记录清理能力。</p>
  <div class="grid">
    <div class="metric">
      <span>事件记录</span>
      <strong>{{ stats.total_events }}</strong>
    </div>
    <div class="metric">
      <span>失败</span>
      <strong>{{ stats.failed_events }}</strong>
    </div>
    <div class="metric">
      <span>待处理</span>
      <strong>{{ stats.pending_events }}</strong>
    </div>
  </div>
</section>
{% endblock %}
