{% extends "base.html" %}
{% block content %}
<h2 class="section-title">System Settings</h2>

{% if message %}<p class="alert success">{{ message }}</p>{% endif %}
{% if error %}<p class="alert error">{{ error }}</p>{% endif %}

<div class="card">
  <h2>管理员设置</h2>
  <form method="post" action="/console/system" class="stack">
    <label>
      <span>管理员用户名</span>
      <input name="username" value="{{ username }}" required>
    </label>

    <div class="row" style="gap:12px;flex-wrap:wrap;">
      <label style="flex:1;min-width:160px;">
        <span>当前密码</span>
        <input name="current_password" type="password" autocomplete="current-password">
      </label>
      <label style="flex:1;min-width:160px;">
        <span>新密码</span>
        <input name="new_password" type="password" autocomplete="new-password">
      </label>
      <label style="flex:1;min-width:160px;">
        <span>确认新密码</span>
        <input name="confirm_password" type="password" autocomplete="new-password">
      </label>
    </div>

    <div class="row" style="gap:16px;">
      <label style="flex:1;max-width:200px;">
        <span>Session 有效期（天）</span>
        <input name="session_days" type="number" min="1" max="365" value="{{ session_days }}" required>
      </label>
      <label style="flex:1;max-width:200px;">
        <span>Event Records 保留数量</span>
        <input name="event_record_limit" type="number" min="1" max="100000" value="{{ event_record_limit }}" required>
      </label>
    </div>

    <div class="row" style="margin-top:4px;">
      <button type="submit">保存设置</button>
    </div>
  </form>
</div>

<div class="card danger-zone">
  <h2>清空 Event Records</h2>
  <p class="muted" style="margin-bottom:12px;">只清空本地记录，不删除已经写入 CalDAV 的日程。</p>
  <form method="post" action="/console/system/clear-events">
    <button type="submit" class="danger">清空事件记录</button>
  </form>
</div>
{% endblock %}
