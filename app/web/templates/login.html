{% extends "base.html" %}
{% block content_login %}
<section class="card narrow">
  <h1 style="font-size: 20px; font-weight: 590; letter-spacing: -0.24px; color: #f7f8f8;">登录后台</h1>
  <p class="muted" style="margin-bottom: 20px;">首次启动生成的管理员密码可在 Docker 日志中查看。</p>
  {% if error %}<p class="alert error">{{ error }}</p>{% endif %}
  <form method="post" action="/console/login" class="stack">
    <label>
      <span>用户名</span>
      <input name="username" autocomplete="username" value="admin" required>
    </label>
    <label>
      <span>密码</span>
      <input name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit" style="width:100%;">登录</button>
  </form>
</section>
{% endblock %}
